<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="reg.css">
    <title>Course Registration Form</title>
</head>
<body bgcolor="lightblue">

<center>

    <h1>🎓 Training Course Registration Form</h1>
    <hr width="50%">

    <form>

        <table cellpadding="10">

            <tr>
                <td><b>Student Name</b></td>
                <td><input type="text" placeholder="Enter Your Name"></td>
            </tr>

            <tr>
                <td><b>Email ID</b></td>
                <td><input type="email" placeholder="Enter Your Email"></td>
            </tr>

            <tr>
                <td><b>Mobile Number</b></td>
                <td><input type="tel" placeholder="Enter Mobile Number"></td>
            </tr>

            <tr>
                <td><b>Gender</b></td>
                <td>
                    <input type="radio" name="gender"> Male
                    <input type="radio" name="gender"> Female
                </td>
            </tr>

            <tr>
                <td><b>Select Course</b></td>
                <td>
                    <select>
                        <option>Java</option>
                        <option>Python</option>
                        <option>HTML & CSS</option>
                        <option>JavaScript</option>
                        <option>Data Analytics</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td><b>Preferred Batch</b></td>
                <td>
                    <input type="radio" name="batch"> Morning
                    <input type="radio" name="batch"> Evening
                </td>
            </tr>

            <tr>
                <td><b>Skills Interested</b></td>
                <td>
                    <input type="checkbox"> Programming
                    <input type="checkbox"> Web Development
                    <input type="checkbox"> Data Analytics
                </td>
            </tr>

            <tr>
                <td><b>Address</b></td>
                <td>
                    <textarea rows="4" cols="25"></textarea>
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Register">
                    <input type="reset" value="Clear">
                </td>
            </tr>

        </table>

    </form>

    <hr width="50%">
    <h3>✨ Start Your Learning Journey Today! ✨</h3>

</center>

</body>
</html>
